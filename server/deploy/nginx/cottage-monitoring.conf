# CottageMonitoring — production
upstream cottage_monitoring_prod {
    server 127.0.0.1:8321;
}

server {
    listen 80;
    server_name monitoring.black-castle.ru;

    location /api/ {
        proxy_pass http://cottage_monitoring_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://cottage_monitoring_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://cottage_monitoring_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Interactive docs / schema disabled in production (info-disclosure hardening).
    # The app also disables these when ENV=production; this is defence in depth.
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }

    # MCP is agent-control; restrict to localhost + private networks only.
    # Public agents must reach it over an authenticated tunnel, not the open web.
    location /mcp {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://cottage_monitoring_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}

# CottageMonitoring — dev
upstream cottage_monitoring_dev {
    server 127.0.0.1:8322;
}

server {
    listen 80;
    server_name monitoring-dev.black-castle.ru;

    location / {
        proxy_pass http://cottage_monitoring_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
